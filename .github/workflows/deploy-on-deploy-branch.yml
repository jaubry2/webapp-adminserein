name: Deploy on deploy branch

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Authentification à GCP avec un service account JSON
      # -> Ajoute GCP_SA_KEY dans les secrets du repo (contenu JSON du compte de service)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: adminserein
          install_components: gke-gcloud-auth-plugin

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # -------- SERVER (backend) : build & push (déploiement géré par Terraform) --------
      - name: Build server Docker image
        run: |
          SERVER_IMAGE="europe-west1-docker.pkg.dev/adminserein/cloud-run-source-deploy/server:${GITHUB_SHA}"
          echo "SERVER_IMAGE=$SERVER_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_server_image=$SERVER_IMAGE" >> $GITHUB_ENV
          docker build \
            -t "$SERVER_IMAGE" \
            -f apps/server/Dockerfile \
            .

      - name: Push server image to Artifact Registry
        run: docker push "$SERVER_IMAGE"

      # -------- WEB (frontend) : build & push (déploiement géré par Terraform) --------
      - name: Build web Docker image
        run: |
          WEB_IMAGE="europe-west1-docker.pkg.dev/adminserein/cloud-run-source-deploy/web:${GITHUB_SHA}"
          echo "WEB_IMAGE=$WEB_IMAGE" >> $GITHUB_ENV
          echo "TF_VAR_web_image=$WEB_IMAGE" >> $GITHUB_ENV
          docker build \
            -t "$WEB_IMAGE" \
            -f apps/web/Dockerfile \
            .

      - name: Push web image to Artifact Registry
        run: docker push "$WEB_IMAGE"

      # -------- INFRA (Terraform) : appliquer la config prod --------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init (prod)
        working-directory: infra/terraform/envs/prod
        run: terraform init -input=false

      - name: Terraform apply (prod)
        working-directory: infra/terraform/envs/prod
        run: |
          terraform apply -auto-approve -input=false \
            -var="server_image=${SERVER_IMAGE}" \
            -var="web_image=${WEB_IMAGE}"
